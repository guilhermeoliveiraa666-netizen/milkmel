<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Restaurante Milk & Mel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Restaurante Milk & Mel</h1>
        <p class="horario">Funcionamento: 11:00 às 15:30</p>
        <div class="status">Estamos Fechados</div>
    </div>

    <div class="card">

        <h2>Monte sua quentinha</h2>

        <div class="opcao">
            <h3>Quentinha P</h3>
            <p>1 carne + 3 acompanhamentos</p>
            <span>R$ 18,00</span>
        </div>

        <div class="opcao">
            <h3>Quentinha G</h3>
            <p>2 carnes + 3 acompanhamentos</p>
            <span>R$ 22,00</span>
        </div>

        <button class="btn">Adicionar à sacola</button>

    </div>

</div>

</body>
</html
