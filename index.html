<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurante Milk & Mel</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="topo">
<img src="./logo.png" class="logo">
</header>

<main>

<!-- INICIO -->
<section id="telaInicial" class="tela ativa">

<h2>Escolha sua quentinha</h2>

<div class="grid">

<div class="card" onclick="abrirMontagem('P')">
<h3>Quentinha P</h3>
<p>Ideal para 1 pessoa</p>
<strong>R$ 18,00</strong>
</div>

<div class="card" onclick="abrirMontagem('G')">
<h3>Quentinha G</h3>
<p>Fome grande 😄</p>
<strong>R$ 22,00</strong>
</div>

</div>
</section>

<!-- MONTAGEM -->
<section id="telaMontagem" class="tela">

<h2>Monte sua quentinha</h2>

<div id="carnes"></div>

<h3>Saladas</h3>
<div id="saladas"></div>

<h3>Extras</h3>

<label class="check">
<input type="checkbox" id="ovo">
<span>Ovo + R$3</span>
</label>



<button class="principal" onclick="adicionarSacola()">
Adicionar à sacola
</button>

</section>

<!-- SACOLA -->
<section id="telaSacola" class="tela">
<h2>Sua Sacola</h2>
<div id="itensSacola"></div>
<h3 id="total"></h3>

<button class="secundario" onclick="voltarMenu()">Adicionar mais itens</button>
<button class="principal" onclick="abrirCadastro()">Avançar</button>
</section>

<!-- CADASTRO -->
<section id="telaCadastro" class="tela">
<h2>Seus dados</h2>
<input id="nome" placeholder="Seu nome">
<input id="telefone" placeholder="Celular">
<button class="principal" onclick="salvarCliente()">Continuar</button>
</section>

<!-- ENDEREÇO -->
<section id="telaEndereco" class="tela">
<h2>Endereço</h2>
<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="bairro" placeholder="Bairro">
<input id="referencia" placeholder="Referência">
<button class="principal" onclick="salvarEndereco()">Continuar</button>
</section>

<!-- PAGAMENTO -->
<section id="telaPagamento" class="tela">

<h2>Pagamento</h2>

<label class="check">
<input type="radio" name="pg" value="Pix" onchange="mostrarTroco()"> Pix
</label>

<label class="check">
<input type="radio" name="pg" value="Cartão" onchange="mostrarTroco()"> Cartão
</label>

<label class="check">
<input type="radio" name="pg" value="Dinheiro" onchange="mostrarTroco()"> Dinheiro
</label>

<!-- TROCO CORRETO -->
<div id="trocoArea" class="troco">

<p>Precisa de troco?</p>

<div class="trocoBtns">
<button type="button" onclick="precisaTroco(true)">Sim</button>
<button type="button" onclick="precisaTroco(false)">Não</button>
</div>

<input id="troco" placeholder="Troco para quanto?" style="display:none;">

</div>

<button class="principal" onclick="finalizarPedido()">
Finalizar Pedido
</button>

</section>

</main>

<script src="script.js"></script>
</body>
</html>
